<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --bg:#eef6fb;
  --card:#ffffff;
  --text:#1a1a1a;
  --primary:#4a90e2;
  --header:#bde0ff;

  --progress:#d0e8ff;
  --done:#c8f7c5;
  --notdone:#ffd6d6;
}

/* DARK MODE */
body.dark{
  --bg:#1e293b;
  --card:#2c3e50;
  --text:#e2e8f0;
  --primary:#60a5fa;
  --header:#3b4c63;

  --progress:#334155;
  --done:#355e3b;
  --notdone:#5e3b3b;
}

body{
  margin:0;
  font-family:Poppins;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:var(--primary);
  color:white;
  flex-wrap:wrap;
}

button{
  border:none;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
}

/* TABLE */
.container{
  padding:10px;
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  background:var(--card);
}

th,td{
  border:1px solid #ccc;
  padding:6px;
  text-align:center;
  font-size:12px;
}

th{
  background:var(--header);
}

/* HABIT COLUMN */
.habit-col{
  text-align:left;
  font-weight:600;
}

/* ROW COLORS */
.progress-row{background:var(--progress);}
.done-row{background:var(--done);}
.notdone-row{background:var(--notdone);}

/* FAB */
.fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  font-size:28px;
  background:var(--primary);
  color:white;
}

/* ANALYSIS PAGE */
#analysisPage{
  display:none;
  padding:20px;
}

.chart-box{
  max-width:500px;
  margin:20px auto;
  background:var(--card);
  padding:15px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

canvas{
  width:100% !important;
  height:200px !important;
}

/* MOBILE */
@media(max-width:600px){
  th,td{font-size:10px;}
}
</style>
</head>

<body>

<header>
  <h3 id="title"></h3>
  <div>
    <button onclick="prevWeek()">◀</button>
    <button onclick="nextWeek()">▶</button>
    <button onclick="openAnalysis()">Analysis</button>
    <button onclick="toggleTheme()">🌙</button>
  </div>
</header>

<!-- MAIN -->
<div id="mainPage" class="container"></div>

<!-- ANALYSIS -->
<div id="analysisPage">
  <button onclick="closeAnalysis()">⬅ Back</button>

  <div class="chart-box">
    <h3>Daily</h3>
    <canvas id="dailyChart"></canvas>
  </div>

  <div class="chart-box">
    <h3>Weekly</h3>
    <canvas id="weeklyChart"></canvas>
  </div>

  <div class="chart-box">
    <h3>Overall</h3>
    <canvas id="progressChart"></canvas>
  </div>
</div>

<button class="fab" onclick="addHabit()">+</button>

<script>
let habits = JSON.parse(localStorage.getItem('habits')) || [];

let today = new Date();
let currentDate = new Date();
let currentWeek = Math.floor((today.getDate()-1)/7);

/* SAVE */
function save(){
  localStorage.setItem('habits', JSON.stringify(habits));
}

/* RENDER */
function render(){
  title.innerText =
    currentDate.toLocaleString('default',{month:'long'}) +
    " " + currentDate.getFullYear() +
    " | Week " + (currentWeek+1);

  let html='<table>';
  html+='<tr><th class="habit-col">Habit</th>';

  let start = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1);
  start.setDate(start.getDate() + currentWeek*7);

  for(let i=0;i<7;i++){
    let date = new Date(start);
    date.setDate(start.getDate()+i);

    html+=`<th>
      ${date.toLocaleDateString('en-US',{weekday:'short'})}
      <br>${date.getDate()}
    </th>`;
  }
  html+='</tr>';

  // HABITS
  habits.forEach((h,i)=>{
    html+=`<tr><td class="habit-col">${h.name}</td>`;
    for(let d=0;d<7;d++){
      let checked = h.days?.[currentWeek]?.[d]||false;

      html+=`<td>
      <input type="checkbox" ${checked?'checked':''}
      onclick="toggle(${i},${d})"></td>`;
    }
    html+='</tr>';
  });

  // CALCULATIONS
  let doneArr=[],totalArr=[];

  for(let d=0;d<7;d++){
    let done=0,total=habits.length;
    habits.forEach(h=>{
      if(h.days?.[currentWeek]?.[d]) done++;
    });
    doneArr[d]=done;
    totalArr[d]=total;
  }

  // PROGRESS %
  html+='<tr class="progress-row"><td>Progress %</td>';
  doneArr.forEach((d,i)=>{
    html+=`<td>${totalArr[i]?Math.round(d/totalArr[i]*100):0}%</td>`;
  });
  html+='</tr>';

  // DONE
  html+='<tr class="done-row"><td>Done</td>';
  doneArr.forEach(d=>html+=`<td>${d}</td>`);
  html+='</tr>';

  // NOT DONE
  html+='<tr class="notdone-row"><td>Not Done</td>';
  doneArr.forEach((d,i)=>html+=`<td>${totalArr[i]-d}</td>`);
  html+='</tr>';

  html+='</table>';
  mainPage.innerHTML=html;
}

/* TOGGLE */
function toggle(i,d){
  if(!habits[i].days) habits[i].days={};
  if(!habits[i].days[currentWeek]) habits[i].days[currentWeek]=[];

  habits[i].days[currentWeek][d]=!habits[i].days[currentWeek][d];

  save();
  render();
}

/* ADD */
function addHabit(){
  let name=prompt("Enter Habit");
  if(!name) return;

  habits.push({name,days:{}});
  save();
  render();
}

/* NAVIGATION */
function nextWeek(){
  currentWeek++;
  if(currentWeek>3){
    currentWeek=0;
    currentDate.setMonth(currentDate.getMonth()+1);
  }
  render();
}

function prevWeek(){
  currentWeek--;
  if(currentWeek<0){
    currentWeek=3;
    currentDate.setMonth(currentDate.getMonth()-1);
  }
  render();
}

/* THEME */
function toggleTheme(){
  document.body.classList.toggle('dark');
}

/* ANALYSIS */
let dailyChart,weeklyChart,progressChart;

function openAnalysis(){
  mainPage.style.display='none';
  analysisPage.style.display='block';
  drawCharts();
}

function closeAnalysis(){
  analysisPage.style.display='none';
  mainPage.style.display='block';
}

function drawCharts(){

  let dCtx=document.getElementById("dailyChart").getContext("2d");
  let wCtx=document.getElementById("weeklyChart").getContext("2d");
  let pCtx=document.getElementById("progressChart").getContext("2d");

  if(dailyChart) dailyChart.destroy();
  if(weeklyChart) weeklyChart.destroy();
  if(progressChart) progressChart.destroy();

  let daily=[];
  for(let d=0;d<7;d++){
    let done=0;
    habits.forEach(h=>{
      if(h.days?.[currentWeek]?.[d]) done++;
    });
    daily.push(done);
  }

  dailyChart=new Chart(dCtx,{
    type:'bar',
    data:{labels:['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],
    datasets:[{label:'Done',data:daily}]}
  });

  let weekly=[0,0,0,0];
  habits.forEach(h=>{
    Object.entries(h.days||{}).forEach(([w,arr])=>{
      weekly[w]+=arr.filter(v=>v).length;
    });
  });

  weeklyChart=new Chart(wCtx,{
    type:'bar',
    data:{labels:['W1','W2','W3','W4'],
    datasets:[{label:'Done',data:weekly}]}
  });

  let done=0,total=0;
  habits.forEach(h=>{
    Object.values(h.days||{}).forEach(arr=>{
      arr.forEach(v=>{
        total++;
        if(v) done++;
      });
    });
  });

  progressChart=new Chart(pCtx,{
    type:'doughnut',
    data:{labels:['Done','Not Done'],
    datasets:[{data:[done,total-done]}]}
  });
}

render();
</script>

</body>
</html>
